<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的導覽網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            text-align: center;
        }
        .nav-button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div class="glass-card max-w-md w-full mx-4">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">檔案導覽</h1>
        <p class="text-gray-600 mb-10">請點擊按鈕查看對應的檔案內容</p>
        
        <div class="space-y-4">
            <!-- 檔案 1 按鈕 -->
            <button onclick="navigateTo('28謝欣菲.txt')" class="nav-button w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 px-6 rounded-xl flex items-center justify-center space-x-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <span>查看 28謝欣菲.txt</span>
            </button>

            <!-- 檔案 2 按鈕 -->
            <button onclick="navigateTo('恭_28_謝欣菲.txt')" class="nav-button w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 px-6 rounded-xl flex items-center justify-center space-x-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
                </svg>
                <span>查看 恭_28_謝欣菲.txt</span>
            </button>
        </div>

        <div id="status-msg" class="mt-6 text-sm text-gray-500 opacity-0 transition-opacity">
            檔案開啟中...
        </div>
    </div>

    <script>
        function navigateTo(url) {
            // 顯示載入狀態
            const msg = document.getElementById('status-msg');
            msg.classList.remove('opacity-0');
            
            // 延遲跳轉以優化體驗
            setTimeout(() => {
                window.location.href = url;
            }, 300);
        }
    </script>
</body>
</html>
